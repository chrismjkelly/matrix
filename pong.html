<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }

    canvas {
      border: 2px solid #333;
      display: block;
    }

    #ui {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.1em;
    }

    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    #message h2 {
      font-size: 2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #message p {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui">W / S &nbsp;|&nbsp; UP / DOWN &nbsp;&mdash;&nbsp; ENTER to start</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Responsive sizing
const W = Math.min(800, window.innerWidth - 32);
const H = Math.round(W * 0.5625); // 16:9
canvas.width = W;
canvas.height = H;

const PADDLE_W = W * 0.015;
const PADDLE_H = H * 0.18;
const PADDLE_SPEED = H * 0.012;
const BALL_SIZE = W * 0.015;
const WINNING_SCORE = 7;

const state = {
  running: false,
  over: false,
  scores: [0, 0],
  ball: { x: 0, y: 0, vx: 0, vy: 0 },
  paddles: [
    { y: H / 2 - PADDLE_H / 2, vy: 0 },
    { y: H / 2 - PADDLE_H / 2, vy: 0 },
  ],
  keys: {},
  winner: -1,
};

function resetBall(dir = 1) {
  const angle = (Math.random() * 0.6 - 0.3); // -0.3 to 0.3 rad
  const speed = W * 0.007;
  state.ball.x = W / 2;
  state.ball.y = H / 2;
  state.ball.vx = dir * Math.cos(angle) * speed;
  state.ball.vy = Math.sin(angle) * speed;
}

function startGame() {
  state.scores = [0, 0];
  state.paddles[0].y = H / 2 - PADDLE_H / 2;
  state.paddles[1].y = H / 2 - PADDLE_H / 2;
  state.over = false;
  state.winner = -1;
  resetBall(Math.random() < 0.5 ? 1 : -1);
  state.running = true;
}

// Input
document.addEventListener('keydown', e => {
  state.keys[e.key] = true;
  if ((e.key === 'Enter' || e.key === ' ') && !state.running) {
    startGame();
  }
});
document.addEventListener('keyup', e => { state.keys[e.key] = false; });

function clampPaddle(p) {
  p.y = Math.max(0, Math.min(H - PADDLE_H, p.y));
}

function update() {
  if (!state.running) return;

  const [p1, p2] = state.paddles;
  const b = state.ball;

  // Player 1 (left): W/S
  if (state.keys['w'] || state.keys['W']) p1.y -= PADDLE_SPEED;
  if (state.keys['s'] || state.keys['S']) p1.y += PADDLE_SPEED;

  // Player 2 (right): ArrowUp/ArrowDown
  if (state.keys['ArrowUp'])   p2.y -= PADDLE_SPEED;
  if (state.keys['ArrowDown']) p2.y += PADDLE_SPEED;

  clampPaddle(p1);
  clampPaddle(p2);

  // Ball movement
  b.x += b.vx;
  b.y += b.vy;

  // Top / bottom walls
  if (b.y - BALL_SIZE / 2 <= 0) {
    b.y = BALL_SIZE / 2;
    b.vy = Math.abs(b.vy);
  }
  if (b.y + BALL_SIZE / 2 >= H) {
    b.y = H - BALL_SIZE / 2;
    b.vy = -Math.abs(b.vy);
  }

  const PADDLE_X_OFFSET = W * 0.04;

  // Left paddle collision
  const lx = PADDLE_X_OFFSET + PADDLE_W;
  if (b.vx < 0 && b.x - BALL_SIZE / 2 <= lx && b.x + BALL_SIZE / 2 >= PADDLE_X_OFFSET) {
    if (b.y + BALL_SIZE / 2 >= p1.y && b.y - BALL_SIZE / 2 <= p1.y + PADDLE_H) {
      const relHit = (b.y - (p1.y + PADDLE_H / 2)) / (PADDLE_H / 2);
      const angle = relHit * 1.1;
      const speed = Math.hypot(b.vx, b.vy) * 1.05;
      b.vx = Math.abs(Math.cos(angle) * speed);
      b.vy = Math.sin(angle) * speed;
      b.x = lx + BALL_SIZE / 2;
    }
  }

  // Right paddle collision
  const rx = W - PADDLE_X_OFFSET - PADDLE_W;
  if (b.vx > 0 && b.x + BALL_SIZE / 2 >= rx && b.x - BALL_SIZE / 2 <= W - PADDLE_X_OFFSET) {
    if (b.y + BALL_SIZE / 2 >= p2.y && b.y - BALL_SIZE / 2 <= p2.y + PADDLE_H) {
      const relHit = (b.y - (p2.y + PADDLE_H / 2)) / (PADDLE_H / 2);
      const angle = relHit * 1.1;
      const speed = Math.hypot(b.vx, b.vy) * 1.05;
      b.vx = -Math.abs(Math.cos(angle) * speed);
      b.vy = Math.sin(angle) * speed;
      b.x = rx - BALL_SIZE / 2;
    }
  }

  // Speed cap
  const maxSpeed = W * 0.02;
  const currentSpeed = Math.hypot(b.vx, b.vy);
  if (currentSpeed > maxSpeed) {
    b.vx = (b.vx / currentSpeed) * maxSpeed;
    b.vy = (b.vy / currentSpeed) * maxSpeed;
  }

  // Scoring
  if (b.x < 0) {
    state.scores[1]++;
    check();
    resetBall(1);
  } else if (b.x > W) {
    state.scores[0]++;
    check();
    resetBall(-1);
  }
}

function check() {
  if (state.scores[0] >= WINNING_SCORE) {
    state.winner = 0;
    state.running = false;
    state.over = true;
  } else if (state.scores[1] >= WINNING_SCORE) {
    state.winner = 1;
    state.running = false;
    state.over = true;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Center dashed line
  ctx.setLineDash([H * 0.03, H * 0.02]);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Scores
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${H * 0.12}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(state.scores[0], W / 2 - W * 0.15, H * 0.18);
  ctx.fillText(state.scores[1], W / 2 + W * 0.15, H * 0.18);

  const PADDLE_X_OFFSET = W * 0.04;

  // Paddles
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.roundRect(PADDLE_X_OFFSET, state.paddles[0].y, PADDLE_W, PADDLE_H, 3);
  ctx.fill();

  ctx.beginPath();
  ctx.roundRect(W - PADDLE_X_OFFSET - PADDLE_W, state.paddles[1].y, PADDLE_W, PADDLE_H, 3);
  ctx.fill();

  // Ball
  if (state.running) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(state.ball.x, state.ball.y, BALL_SIZE / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Overlay
  if (!state.running) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';

    if (state.over) {
      ctx.font = `bold ${H * 0.1}px 'Courier New', monospace`;
      ctx.fillText(`PLAYER ${state.winner + 1} WINS`, W / 2, H / 2 - H * 0.05);
      ctx.font = `${H * 0.045}px 'Courier New', monospace`;
      ctx.fillStyle = '#888';
      ctx.fillText('PRESS ENTER TO PLAY AGAIN', W / 2, H / 2 + H * 0.05);
    } else {
      ctx.font = `bold ${H * 0.1}px 'Courier New', monospace`;
      ctx.fillText('PONG', W / 2, H / 2 - H * 0.08);
      ctx.font = `${H * 0.04}px 'Courier New', monospace`;
      ctx.fillStyle = '#888';
      ctx.fillText('W / S  vs  ↑ / ↓', W / 2, H / 2 + H * 0.02);
      ctx.fillText('PRESS ENTER TO START', W / 2, H / 2 + H * 0.1);
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
