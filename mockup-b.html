<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup B — Task Inside Ring</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container { text-align: center; padding: 2rem; }

    h1 {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2rem;
    }

    .mode-tabs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .mode-btn {
      background: none;
      border: none;
      color: #888;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .mode-btn.active {
      background: rgba(0,0,0,0.08);
      color: #222;
    }

    .timer-ring {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 2.5rem;
    }

    .timer-ring svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: rgba(0,0,0,0.1); stroke-width: 6; }
    .ring-progress { fill: none; stroke: #e74c3c; stroke-width: 6; stroke-linecap: round; }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
    }

    .time { font-size: 3.6rem; font-weight: 300; letter-spacing: 0.05em; line-height: 1; }
    .session-label { font-size: 0.75rem; color: #888; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.1em; }

    /* ── OPTION B: task inside ring ── */
    .task-inside {
      margin-top: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    .task-inside-text {
      font-size: 0.8rem;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }

    .task-inside svg { color: #ccc; flex-shrink: 0; }
    /* ──────────────────────────────── */

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      margin-bottom: 2rem;
    }

    .btn-primary {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 0.8rem 2.5rem;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-width: 130px;
    }

    .btn-icon {
      background: none;
      border: none;
      color: #aaa;
      padding: 0.6rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rounds { display: flex; gap: 0.5rem; justify-content: center; }
    .round-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.15); }
    .round-dot.done { background: #e74c3c; }

    .mockup-label {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #e74c3c;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="mockup-label">Mockup B — Task inside ring</div>
  <div class="container">
    <h1>One Step At A Time</h1>

    <div class="mode-tabs">
      <button class="mode-btn active">Pomodoro</button>
      <button class="mode-btn">Short Break</button>
      <button class="mode-btn">Long Break</button>
    </div>

    <div class="timer-ring">
      <svg width="260" height="260" viewBox="0 0 260 260">
        <circle class="ring-bg" cx="130" cy="130" r="118"/>
        <circle class="ring-progress" cx="130" cy="130" r="118" stroke-dasharray="741.4" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display">
        <div class="time">25:00</div>
        <div class="session-label">Focus</div>
        <!-- OPTION B: task field here, inside the ring -->
        <div class="task-inside">
          <span class="task-inside-text">Write report</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
        </svg>
      </button>
      <button class="btn-primary">Start</button>
      <button class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <div class="rounds">
      <div class="round-dot done"></div>
      <div class="round-dot done"></div>
      <div class="round-dot"></div>
      <div class="round-dot"></div>
    </div>
  </div>
</body>
</html>
