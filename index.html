<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      color: #666;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
    }

    a {
      display: block;
      padding: 1rem 1.5rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      font-weight: 500;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    a:hover {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
    }

    a span {
      display: block;
      font-size: 0.8rem;
      color: #999;
      font-weight: 400;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <h1>Matrix</h1>
  <p>Project pages</p>
  <div class="links">
    <a href="pomodoro.html">
      Pomodoro Timer
      <span>Focus timer with task tracking</span>
    </a>
    <a href="mockup-a.html">
      Mockup A
      <span>Task above ring</span>
    </a>
    <a href="mockup-b.html">
      Mockup B
      <span>Task inside ring</span>
    </a>
    <a href="mockup-c.html">
      Mockup C
      <span>Task card below controls</span>
    </a>
  </div>
</body>
</html>
